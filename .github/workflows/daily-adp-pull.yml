name: Daily ADP Pull

on:
  schedule:
    # 13:30 UTC = 09:30 EDT / 08:30 EST. Primary daily run.
    - cron: '30 13 * * *'
    # Backup at 15:30 UTC in case the 13:30 slot was skipped by GH Actions.
    # Idempotent: the puller no-ops if today's auto rows are already present.
    - cron: '30 15 * * *'
  workflow_dispatch:  # also allow manual triggering from the Actions UI

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # so the bot can commit the new CSVs back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      - name: Pull ADPs from Google Sheet
        run: python scripts/pull_adp.py

      - name: Commit and push if changed
        run: |
          git config user.name  "ezdubs-bot"
          git config user.email "ezdubs-bot@users.noreply.github.com"
          git add dashboards/best-ball-prices/dk_adp_history.csv \
                  dashboards/best-ball-prices/ud_adp_history.csv \
                  dashboards/best-ball-prices/ffpc_adp_history.csv \
                  dashboards/best-ball-prices/drafters_adp_history.csv
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Auto: ADP snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
