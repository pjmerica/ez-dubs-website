<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Dubs Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #0f1923; color: #e0e0e0; }

        /* Site nav */
        .site-nav {
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 28px;
            padding: 14px 28px;
            background: #0f1923; border-bottom: 1px solid #1e2d3d;
        }
        .site-nav .brand {
            font-weight: 700; font-size: 1.05rem; color: #fff;
            text-decoration: none; white-space: nowrap;
        }
        .site-nav .brand .accent { color: #4a9eff; }
        .site-nav .nav-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .site-nav .nav-tabs a {
            padding: 8px 16px; border-radius: 8px; border: 1px solid #2a3a4a;
            background: #1a2634; color: #aaa; text-decoration: none;
            font-size: 0.9rem; font-weight: 600; transition: all 0.15s;
        }
        .site-nav .nav-tabs a:hover { border-color: #4a9eff; color: #fff; }
        .site-nav .nav-tabs a.active { border-color: #4a9eff; color: #4a9eff; }

        /* Page */
        main { max-width: 720px; margin: 0 auto; padding: 60px 20px; }
        h1 { color: #fff; font-size: 2.4rem; margin: 0 0 8px; }
        p.lede { color: #99aabb; font-size: 1rem; margin: 0 0 32px; }
        a.tile { display: block; padding: 20px 24px; margin-bottom: 12px;
                 background: #1a2634; border: 1px solid #2a3a4a; border-radius: 12px;
                 color: #4a9eff; text-decoration: none; transition: border-color 0.15s; }
        a.tile:hover { border-color: #4a9eff; }
        a.tile h2 { margin: 0 0 4px; font-size: 1.1rem; }
        a.tile p { margin: 0; color: #888; font-size: 0.88rem; }
    </style>
</head>
<body>
    <nav class="site-nav">
        <a class="brand" href="./">EZ Dubs <span class="accent">Analytics</span></a>
        <div class="nav-tabs">
            <a href="./" class="active">Home</a>
            <a href="dashboards/adp-arbitrage/">Best Ball Arbitrage</a>
        </div>
    </nav>
    <main>
        <h1>EZ Dubs Analytics</h1>
        <p class="lede">Best ball, DFS, and football analytics.</p>
        <a class="tile" href="dashboards/adp-arbitrage/">
            <h2>Best Ball Arbitrage &rarr;</h2>
            <p>DraftKings vs Underdog ADP gaps for the 2026 NFL season.</p>
        </a>
    </main>
</body>
</html>
